<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hygienic Design</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <video class="background-video" autoplay muted loop playsinline preload="auto" poster="">
        <source src="Resources/Hygienic_introvideo_wide_black.mp4" type="video/mp4">
    </video>

    <img class="logo" src="Resources/Hygienic_Design_Logo_landscape.svg" alt="Hygienic Design">

    <aside class="glass-card" id="announcement" role="complementary" aria-labelledby="announcement-title">
        <button class="glass-card__close" type="button" aria-label="Dismiss announcement">
            <svg viewBox="0 0 14 14" aria-hidden="true" focusable="false">
                <path d="M1 1 L13 13 M13 1 L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>
        <h2 class="glass-card__heading" id="announcement-title">Soon to come</h2>
        <p class="glass-card__body">Discovery: identifying, assessing and prioritising opportunities for AI agents and use cases within SKIDATA.</p>
    </aside>

    <script src="script.js"></script>
</body>
</html>
